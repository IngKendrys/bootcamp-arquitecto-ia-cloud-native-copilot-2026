apiVersion: apps/v1
kind: Deployment
metadata: { name: api-dotnet }
spec:
  replicas: 2
  selector: { matchLabels: { app: api-dotnet } }
  template:
    metadata: { labels: { app: api-dotnet } }
    spec:
      imagePullSecrets:
      {{- range .Values.imagePullSecrets }}
      - name: {{ .name }}
      {{- end }}
      containers:
      - name: api
        image: {{ .Values.backend.image }}
        ports: [{containerPort: {{ .Values.backend.containerPort }} }]
        readinessProbe:
          tcpSocket: { port: {{ .Values.backend.containerPort }} }
          initialDelaySeconds: 5
          periodSeconds: 10
