name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend-dotnet:
    name: Backend build & test (.NET 10)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/dotnet10-api/src
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Api.csproj

      - name: Build
        run: dotnet build Api.csproj -c Release --no-restore

      - name: Test
        run: dotnet test Api.csproj -c Release --no-build --verbosity normal

  frontend-angular:
    name: Frontend build & test (Angular 21)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/angular21-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: templates/angular21-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: |
          if find src -type f \( -name "*.spec.ts" -o -name "*.test.ts" \) | grep -q .; then
            npm test -- --watch=false
          else
            echo "No Angular tests found (*.spec.ts/*.test.ts). Skipping test step.";
          fi

  docker-build-smoke:
    name: Docker build smoke test
    runs-on: ubuntu-latest
    needs: [backend-dotnet, frontend-angular]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: templates/dotnet10-api
          file: templates/dotnet10-api/Dockerfile
          push: false
          tags: local/backend-ci:pr

      - name: Build frontend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: templates/angular21-app
          file: templates/angular21-app/Dockerfile
          push: false
          tags: local/frontend-angular-ci:pr
