services:
  db:
    image: postgres:18
    container_name: fastapi-lab-db
    environment:
      POSTGRES_DB: fastapi_lab
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fastapi_lab"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastapi-lab-api
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/fastapi_lab
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
